  </div>
  <p style="font-size:13px;color:#666;margin-bottom:12px">לחץ על שיתוף 📤 ואז "הוסף למסך הבית" כדי להשתמש כאפליקציה</p>
  <button onclick="document.getElementById('install-banner').style.display='none';localStorage.setItem('banner-dismissed','1')" style="background:#8DC63F;color:#fff;border:none;padding:10px 20px;border-radius:10px;font-family:'Heebo',sans-serif;font-weight:700;font-size:14px;cursor:pointer;width:100%">הבנתי!</button>
</div>
<div id="root"></div>

<script>
if('serviceWorker' in navigator){
  const sw=`
    const CACHE='ono-v2';
    const ASSETS=[
      'https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap',
      'https://unpkg.com/react@18/umd/react.production.min.js',
      'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
      'https://unpkg.com/@babel/standalone/babel.min.js'
    ];
    self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS).catch(()=>{})));self.skipWaiting()});
    self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim()});
    self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok){const c=res.clone();caches.open(CACHE).then(cache=>cache.put(e.request,c))}return res}).catch(()=>caches.match(e.request))))});
    self.addEventListener('push',e=>{const d=e.data?e.data.json():{};self.registration.showNotification(d.title||'Ono',{body:d.body||'',icon:d.icon||''})});
  `;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
window.addEventListener('online',()=>document.getElementById('offline-bar').classList.remove('show'));
window.addEventListener('offline',()=>document.getElementById('offline-bar').classList.add('show'));
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
if(isIOS&&!window.navigator.standalone&&!localStorage.getItem('banner-dismissed')){
  setTimeout(()=>{document.getElementById('install-banner').style.display='block'},2500);
}
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-banner').style.display='block';
  document.getElementById('install-banner').querySelector('button:last-child').addEventListener('click',async()=>{
    document.getElementById('install-banner').style.display='none';
    if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;}
  });
});
</script>

function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

function fireConfetti(){
  const colors=[G,GD,"#FFD700","#FF6B6B","#4A90E2","#FD79A8"];
  for(let i=0;i<40;i++){
    const el=document.createElement("div");
    el.className="confetti-piece";
    const size=6+Math.random()*8;
    el.style.cssText=`left:${Math.random()*100}vw;top:10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${size}px;height:${size}px;border-radius:${Math.random()>.5?"50%":"2px"};animation-delay:${Math.random()*.5}s;animation-duration:${1.2+Math.random()*.8}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2500);
  }
}

function mkT(dark){
  return{
    bg:dark?'#111':'#f0f2f5',
    card:dark?'#1c1c1e':'#fff',
    cardBorder:dark?'#2c2c2e':'#eee',
    text:dark?'#f0f0f0':'#1a1a1a',
    sub:dark?'#8e8e93':'#999',
    dim:dark?'#444':'#ccc',
    inputBg:dark?'#2c2c2e':'#f8f8f8',
    inputBorder:dark?'#3a3a3c':'#e8e8e8',
    navBg:dark?'#1c1c1e':'#fff',
    ghostBg:dark?'#2c2c2e':'#f0f2f5',
    ghostText:dark?'#aeaeb2':'#555',
    headerBg:dark?'#1c1c1e':'#fff',
    progressBg:dark?'#2c2c2e':'#eee',
    sectionLine:dark?'#2c2c2e':'#f5f5f5',
    settingRow:dark?'#2c2c2e':'#f8f8f8',
  };
}

function App(){
  const [tab,setTab]=React.useState("home");
  const [tasks,setTasks]=React.useState(()=>load("ono-tasks-v4",[]));
  const [grades,setGrades]=React.useState(()=>load("ono-grades-v2",{}));
  const [attendance,setAttendance]=React.useState(()=>load("ono-attend-v2",{}));
  const [notes,setNotes]=React.useState(()=>load("ono-notes-v2",{}));
  const [dark,setDark]=React.useState(()=>load("ono-dark",false));
  const [modal,setModal]=React.useState(null);
  const [editTask,setEditTask]=React.useState(null);
  const [activeCourse,setActiveCourse]=React.useState(null);
  const [taskFilter,setTaskFilter]=React.useState("הכל");
  const [sortBy,setSortBy]=React.useState("date");
  const [search,setSearch]=React.useState("");
  const [notifPerm,setNotifPerm]=React.useState(()=>typeof Notification!=='undefined'?Notification.permission:'default');

  const T=mkT(dark);

  React.useEffect(()=>save("ono-tasks-v4",tasks),[tasks]);
  React.useEffect(()=>save("ono-grades-v2",grades),[grades]);
  React.useEffect(()=>save("ono-attend-v2",attendance),[attendance]);
  React.useEffect(()=>save("ono-notes-v2",notes),[notes]);
  React.useEffect(()=>{
    save("ono-dark",dark);
    document.body.classList.toggle("dark",dark);
    const mc=document.querySelector('meta[name=theme-color]');
    if(mc)mc.setAttribute('content',dark?'#1c1c1e':'#8DC63F');
  },[dark]);

  React.useEffect(()=>{
    if(typeof Notification!=='undefined'&&Notification.permission==='granted'){
      checkNotifications(tasks);
    }
  },[]);

  function checkNotifications(tList){
    const today=new Date();today.setHours(0,0,0,0);
    const todayStr=today.toISOString().split('T')[0];
    const tmrStr=new Date(today.getTime()+86400000).toISOString().split('T')[0];
    const lastCheck=localStorage.getItem('ono-last-notify');
    if(lastCheck===todayStr)return;
    localStorage.setItem('ono-last-notify',todayStr);
    const icon='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="32" r="32" fill="%238DC63F"/><text x="32" y="42" text-anchor="middle" font-size="28" fill="white">📚</text></svg>';
    (tList||tasks).filter(t=>!t.done&&t.dueDate).forEach(t=>{
      if(t.dueDate===todayStr)new Notification('⏰ הגשה היום!',{body:t.title,icon,tag:String(t.id)+'today'});
      else if(t.dueDate===tmrStr)new Notification('📅 הגשה מחר',{body:t.title,icon,tag:String(t.id)+'tmr'});
    });
  }

  async function requestNotifications(){
    if(!('Notification' in window))return alert('הדפדפן לא תומך בהתראות');
    const perm=await Notification.requestPermission();
    setNotifPerm(perm);
    if(perm==='granted'){localStorage.removeItem('ono-last-notify');checkNotifications(tasks);}
    else if(perm==='denied')alert('כדי לאפשר התראות — שנה הגדרות בדפדפן');
  }

  const today=new Date();
  const heDay=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"][today.getDay()===0?6:today.getDay()-1];
  const daysLeft=Math.max(0,Math.ceil((SEMESTER_END-today)/86400000));
  const getDL=(d)=>Math.ceil((new Date(d)-today)/86400000);
  const urgColor=(d)=>d<0?"#E24A4A":d<=3?"#FF8C00":d<=7?"#F39C12":G;

  const addTask=(t)=>{setTasks(p=>[...p,{...t,id:Date.now(),done:false}]);setModal(null)};
  const updTask=(id,f)=>setTasks(p=>p.map(t=>t.id===id?{...t,...f}:t));
  const delTask=(id)=>{if(window.confirm("למחוק משימה?"))setTasks(p=>p.filter(t=>t.id!==id))};

  const toggleDone=(id)=>{
    const t=tasks.find(t=>t.id===id);
    if(!t)return;
    if(!t.done){
      fireConfetti();
      if(t.recurring&&t.recurring!=='ללא חזרה'&&t.dueDate){
        const daysMap={'שבועי':7,'דו-שבועי':14,'חודשי':30};
        const addDays=daysMap[t.recurring]||7;
        const nd=new Date(t.dueDate);nd.setDate(nd.getDate()+addDays);
        const newTask={...t,id:Date.now()+1,done:false,dueDate:nd.toISOString().split('T')[0]};
        setTasks(p=>[...p.map(x=>x.id===id?{...x,done:true}:x),newTask]);
        return;
      }
    }
    updTask(id,{done:!t.done});
  };

  const courseTasks=(id)=>tasks.filter(t=>t.courseId==id);
  const pending=tasks.filter(t=>!t.done);
  const upcoming=pending.filter(t=>t.dueDate).sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate));
  const overdue=upcoming.filter(t=>getDL(t.dueDate)<0);
  const todayClasses=COURSES.filter(c=>c.day===heDay);
  const avgGrade=()=>{const v=Object.values(grades).filter(g=>g&&!isNaN(+g));return v.length?Math.round(v.reduce((a,b)=>a+ +b,0)/v.length):null};
  const totalDone=tasks.filter(t=>t.done).length;
  const totalPct=tasks.length?Math.round(totalDone/tasks.length*100):0;

  function exportData(){
    const data={tasks,grades,attendance,notes,exportDate:new Date().toISOString(),version:'v4'};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`ono-backup-${today.toISOString().split('T')[0]}.json`;
    a.click();URL.revokeObjectURL(url);
  }

  function importData(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(window.confirm(`ייבא ${data.tasks?.length||0} משימות ו-${Object.keys(data.grades||{}).length} ציונים?\n(הנתונים הנוכחיים יוחלפו)`)){
          if(data.tasks)setTasks(data.tasks);
          if(data.grades)setGrades(data.grades);
          if(data.attendance)setAttendance(data.attendance);
          if(data.notes)setNotes(data.notes);
          alert('✅ הנתונים יובאו בהצלחה!');
        }
      }catch{alert('❌ שגיאה בקריאת הקובץ. ודא שזה קובץ גיבוי תקין.');}
    };
    reader.readAsText(file);e.target.value='';
  }

  // ── Donut Chart ──
  function DonutChart({pct,size=80,sw=9,color=G}){
    const r=(size-sw)/2,circ=2*Math.PI*r;
    return(
      <svg width={size} height={size} style={{flexShrink:0}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.progressBg} strokeWidth={sw}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)}
          strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}
          style={{transition:'stroke-dashoffset .6s ease'}}/>
        <text x="50%" y="50%" dominantBaseline="middle" textAnchor="middle"
          style={{fontSize:size*0.2,fontWeight:900,fill:color,fontFamily:'Heebo,sans-serif'}}>{pct}%</text>
      </svg>
    );
  }

  // ── Mini bar chart for grades ──
  function GradeBar({value,color,label}){
    const pct=value?Math.min(100,value):0;
    const clr=value>=90?'#27AE60':value>=80?G:value>=70?'#F39C12':value>=60?'#FF8C00':'#E24A4A';
    return(
      <div style={{marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
          <span style={{color:T.sub,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'70%'}}>{label}</span>
          <span style={{fontWeight:900,color:value?clr:T.dim}}>{value||'—'}</span>
        </div>
        <div className="progress-bar" style={{height:7}}>
          <div className="progress-fill" style={{width:`${pct}%`,background:value?clr:T.progressBg}}/>
        </div>
      </div>
    );
  }

  // ── Task Row ──
  function TaskRow({t,onEdit,showCourse}){
    const course=COURSES.find(c=>c.id==t.courseId);
    const days=t.dueDate?getDL(t.dueDate):null;
    const tc=TYPE_COLOR[t.type]||"#888";
    return(
      <div className="task-row" style={{opacity:t.done?.5:1,borderColor:t.priority&&!t.done?'#F39C1255':undefined,position:'relative',overflow:'hidden'}}>
        {t.priority&&!t.done&&<div style={{position:'absolute',top:0,right:0,width:3,height:'100%',background:'#F39C12'}}/>}
        {t.recurring&&t.recurring!=='ללא חזרה'&&<div style={{position:'absolute',top:0,left:0,width:3,height:'100%',background:'#9B59B6'}}/>}
        <div className={`circle-check${t.done?" done":""}`} onClick={()=>toggleDone(t.id)}>
          {t.done&&<span style={{fontSize:13,color:'#fff',fontWeight:900}}>✓</span>}
        </div>
        <div style={{flex:1,minWidth:0}} onClick={onEdit}>
          <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:3}}>
            {t.priority&&!t.done&&<span style={{fontSize:12}}>🔥</span>}
            {t.recurring&&t.recurring!=='ללא חזרה'&&<span style={{fontSize:12}}>🔄</span>}
            <span style={{fontWeight:700,fontSize:15,color:T.text,textDecoration:t.done?'line-through':'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</span>
          </div>
          <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
            <span className="badge" style={{background:tc+'22',color:tc}}>{TYPE_EMOJI[t.type]} {t.type}</span>
            {showCourse&&course&&<span style={{fontSize:11,color:T.dim,background:course.color+'22',padding:'2px 6px',borderRadius:8}}>{course.short}</span>}
            {t.note&&<span style={{fontSize:11,color:T.dim,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:90}}>{t.note}</span>}
          </div>
        </div>
        <div style={{textAlign:'center',flexShrink:0,minWidth:48}}>
          {days!==null&&!t.done&&<>
            <div style={{fontWeight:900,fontSize:15,color:urgColor(days)}}>{days<0?"פג!":days===0?"היום":`${days}י׳`}</div>
            <div style={{fontSize:10,color:T.dim}}>{new Date(t.dueDate).toLocaleDateString("he-IL",{day:"numeric",month:"numeric"})}</div>
          </>}
          {t.done&&<span style={{fontSize:18}}>✅</span>}
        </div>
        <button onClick={()=>delTask(t.id)} className="no-print" style={{background:'none',border:'none',color:T.dim,cursor:'pointer',fontSize:17,padding:'4px 6px',flexShrink:0}}>✕</button>
      </div>
    );
  }

  // ── Home Tab ──
  function HomeTab(){
    const todayUp=upcoming.filter(t=>getDL(t.dueDate)>=0);
    return(
      <div className="slide-up">
        {/* Hero card */}
        <div className="card" style={{padding:'20px',marginBottom:16,background:`linear-gradient(135deg,${G},${GD})`,color:'#fff',border:'none',borderRadius:20}}>
          <div style={{fontSize:13,opacity:.85,marginBottom:4}}>{today.toLocaleDateString("he-IL",{weekday:'long',day:'numeric',month:'long'})}</div>
          <div style={{fontWeight:900,fontSize:19,marginBottom:14,lineHeight:1.3}}>
            {overdue.length>0?`⚠️ יש ${overdue.length} משימות שעברו תאריך!`:todayUp.length>0?`יש לך ${todayUp.length} משימות פתוחות`:'✅ הכל בסדר! כל הכבוד 🎉'}
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',gap:22}}>
              <div><div style={{fontWeight:900,fontSize:26,lineHeight:1}}>{daysLeft}</div><div style={{fontSize:11,opacity:.8}}>ימים לסיום</div></div>
              <div><div style={{fontWeight:900,fontSize:26,lineHeight:1}}>{pending.length}</div><div style={{fontSize:11,opacity:.8}}>פתוחות</div></div>
              {avgGrade()!=null&&<div><div style={{fontWeight:900,fontSize:26,lineHeight:1}}>{avgGrade()}</div><div style={{fontSize:11,opacity:.8}}>ממוצע</div></div>}
            </div>
            {tasks.length>0&&(
              <div style={{position:'relative'}}>
                <DonutChart pct={totalPct} size={72} sw={8} color={totalPct===100?'#FFD700':'rgba(255,255,255,0.9)'}/>
                <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
                  <span style={{fontSize:9,color:'rgba(255,255,255,0.7)',marginTop:22}}>הושלמו</span>
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Today's classes */}
        {todayClasses.length>0&&<>
          <div className="section-title"><div className="section-bar"/><span style={{fontWeight:700,fontSize:16,color:T.text}}>השיעורים שלי היום</span></div>
          {todayClasses.map(c=>(
            <div key={c.id} className="card" style={{padding:'14px 16px',marginBottom:8,borderRight:`4px solid ${c.color}`,display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}
              onClick={()=>{setActiveCourse(c);setModal('course')}}>
              <div><div style={{fontWeight:700,fontSize:15,color:T.text}}>{c.name}</div><div style={{fontSize:13,color:T.sub,marginTop:2}}>🕐 {c.time}</div></div>
              <span style={{fontSize:22}}>📡</span>
            </div>
          ))}
          <div style={{marginBottom:16}}/>
        </>}
        {todayClasses.length===0&&<div className="card" style={{padding:'12px 16px',marginBottom:16,textAlign:'center',color:T.sub}}>
          <div style={{fontSize:20,marginBottom:3}}>🎉</div><div style={{fontSize:13}}>אין שיעורי ZOOM היום</div>
        </div>}

        {/* Overdue */}
        {overdue.length>0&&<>
          <div className="section-title"><div className="section-bar" style={{background:'#E24A4A'}}/><span style={{fontWeight:700,fontSize:16,color:'#E24A4A'}}>⚠️ עברו תאריך</span></div>
          {overdue.map(t=><TaskRow key={t.id} t={t} onEdit={()=>{setEditTask(t);setModal('edit')}} showCourse/>)}
          <div style={{marginBottom:12}}/>
        </>}

        {/* Upcoming */}
        {todayUp.slice(0,5).length>0&&<>
          <div className="section-title"><div className="section-bar"/><span style={{fontWeight:700,fontSize:16,color:T.text}}>הגשות קרובות</span></div>
          {todayUp.slice(0,5).map(t=><TaskRow key={t.id} t={t} onEdit={()=>{setEditTask(t);setModal('edit')}} showCourse/>)}
          {todayUp.length>5&&<div style={{textAlign:'center',fontSize:13,color:T.sub,padding:'8px 0'}}>ועוד {todayUp.length-5} משימות...</div>}
        </>}

        {tasks.length===0&&<div className="card" style={{padding:36,textAlign:'center',marginBottom:16,borderColor:'#8DC63F33',borderStyle:'dashed',borderWidth:2}}>
          <div style={{fontSize:40,marginBottom:10}}>📚</div>
          <div style={{color:T.sub,fontSize:15}}>לחץ על קורס בלוח השעות<br/>כדי להוסיף משימות</div>
        </div>}

        <button className="btn btn-green no-print" onClick={()=>setModal('add')} style={{width:'100%',padding:16,fontSize:16,borderRadius:16,marginTop:4}}>
          ＋ הוסף משימה / מבחן
        </button>
      </div>
    );
  }

  // ── Schedule Tab ──
  function ScheduleTab(){
    return(
      <div className="slide-up">
        <div className="section-title"><div className="section-bar"/><span style={{fontWeight:700,fontSize:16,color:T.text}}>לוח שעות שבועי</span></div>
        {DAYS.map(day=>{
          const dc=COURSES.filter(c=>c.day===day);
          if(!dc.length)return null;
          const isToday=day===heDay;
          return(
            <div key={day} style={{marginBottom:20}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                <span style={{fontWeight:700,fontSize:15,color:isToday?G:T.sub}}>יום {day}</span>
                {isToday&&<span className="badge" style={{background:G,color:'#fff'}}>היום</span>}
              </div>
              {[...dc].sort((a,b)=>(a.time||'').localeCompare(b.time||'')).map(c=>{
                const ct=courseTasks(c.id);
                const pct=ct.length?Math.round(ct.filter(t=>t.done).length/ct.length*100):0;
                return(
                  <div key={c.id} className="card" style={{padding:'13px 14px',marginBottom:8,borderRight:`4px solid ${c.color}`,cursor:'pointer'}}
                    onClick={()=>{setActiveCourse(c);setModal('course')}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:14,color:T.text}}>{c.name}</div>
                        <div style={{fontSize:12,color:T.sub,marginTop:3}}>🕐 {c.time} · {c.format}</div>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                        {grades[c.id]?<span className="badge" style={{background:`${G}22`,color:GD,fontSize:13,fontWeight:900}}>{grades[c.id]}</span>:null}
                        {ct.length>0&&<span style={{fontSize:11,color:T.dim}}>{ct.length} משימות</span>}
                      </div>
                    </div>
                    {ct.length>0&&<div style={{marginTop:10}}><div className="progress-bar" style={{height:4}}><div className="progress-fill" style={{width:`${pct}%`}}/></div></div>}
                  </div>
                );
              })}
            </div>
          );
        })}
        <div style={{marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:15,color:T.sub,marginBottom:10}}>🌐 E-Learning</div>
          {COURSES.filter(c=>!c.day).map(c=>(
            <div key={c.id} className="card" style={{padding:'13px 14px',marginBottom:8,borderRight:`4px solid ${c.color}`,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}}
              onClick={()=>{setActiveCourse(c);setModal('course')}}>
              <div><div style={{fontWeight:700,fontSize:14,color:T.text}}>{c.name}</div><div style={{fontSize:12,color:T.sub,marginTop:2}}>ללמידה עצמית</div></div>
              {grades[c.id]?<span className="badge" style={{background:`${G}22`,color:GD,fontSize:13,fontWeight:900}}>{grades[c.id]}</span>:null}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── Tasks Tab ──
  function TasksTab(){
    const [showDone,setShowDone]=React.useState(false);
    const base=(taskFilter==='הכל'?tasks:tasks.filter(t=>t.type===taskFilter))
      .filter(t=>{
        if(!search)return true;
        const q=search.toLowerCase();
        const course=COURSES.find(c=>c.id==t.courseId);
        return t.title.toLowerCase().includes(q)||(course&&course.name.toLowerCase().includes(q))||(t.note&&t.note.toLowerCase().includes(q))||t.type.includes(search);
      });
    const pend=[...base.filter(t=>!t.done)].sort((a,b)=>{
      if(sortBy==='priority')return(b.priority?1:0)-(a.priority?1:0);
      if(sortBy==='course')return(COURSES.find(c=>c.id==a.courseId)?.name||'').localeCompare(COURSES.find(c=>c.id==b.courseId)?.name||'');
      return new Date(a.dueDate||'9999')-new Date(b.dueDate||'9999');
    });
    const done=base.filter(t=>t.done);
    return(
      <div className="slide-up">
        {/* Search bar */}
        <div className="search-bar">
          <span style={{fontSize:18}}>🔍</span>
          <input placeholder="חפש משימה, קורס, סוג..." value={search} onChange={e=>setSearch(e.target.value)} style={{color:T.text}}/>
          {search&&<button onClick={()=>setSearch('')} style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:T.dim,padding:0}}>✕</button>}
        </div>

        {/* Filters */}
        <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:14,overflowX:'auto',paddingBottom:4}}>
          {["הכל",...TYPES].map(f=>(
            <button key={f} className={`chip${taskFilter===f?" active":""}`} onClick={()=>setTaskFilter(f)}>{f}</button>
          ))}
        </div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <span style={{fontSize:13,color:T.sub}}>{pend.length} פעילות · {done.length} הושלמו</span>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{width:'auto',padding:'6px 12px',fontSize:13,borderRadius:10}}>
            <option value="date">לפי תאריך</option>
            <option value="priority">לפי עדיפות</option>
            <option value="course">לפי קורס</option>
          </select>
        </div>

        {pend.length===0&&done.length===0&&<div className="card" style={{padding:40,textAlign:'center',color:T.sub}}>
          <div style={{fontSize:40,marginBottom:10}}>{search?'🔍':'📭'}</div>
          <div>{search?'לא נמצאו תוצאות':'אין משימות'}</div>
        </div>}

        {pend.map(t=><TaskRow key={t.id} t={t} onEdit={()=>{setEditTask(t);setModal('edit')}} showCourse/>)}

        {done.length>0&&<>
          <button className="btn btn-ghost" style={{width:'100%',padding:12,marginTop:4,marginBottom:8,fontSize:14}} onClick={()=>setShowDone(p=>!p)}>
            {showDone?'▲':'▼'} הושלמו ({done.length})
          </button>
          {showDone&&done.map(t=><TaskRow key={t.id} t={t} onEdit={()=>{setEditTask(t);setModal('edit')}} showCourse/>)}
        </>}

        <button className="btn btn-green no-print" onClick={()=>setModal('add')} style={{width:'100%',padding:16,fontSize:16,borderRadius:16,marginTop:12}}>
          ＋ הוסף משימה
        </button>
      </div>
    );
  }

  // ── Grades Tab ──
  function GradesTab(){
    const avg=avgGrade();
    const graded=COURSES.filter(c=>grades[c.id]&&!isNaN(+grades[c.id]));
    const best=graded.length?graded.reduce((a,b)=>+grades[a.id]>+grades[b.id]?a:b,graded[0]):null;
    const worst=graded.length?graded.reduce((a,b)=>+grades[a.id]<+grades[b.id]?a:b,graded[0]):null;

    return(
      <div className="slide-up">
        {/* Summary hero */}
        <div className="card" style={{padding:'20px',marginBottom:16,background:`linear-gradient(135deg,${G},${GD})`,color:'#fff',border:'none',borderRadius:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:13,opacity:.85,marginBottom:4}}>ממוצע כללי</div>
              <div style={{fontWeight:900,fontSize:52,lineHeight:1}}>{avg||'—'}</div>
              <div style={{fontSize:12,opacity:.7,marginTop:4}}>{graded.length} קורסים עם ציון</div>
            </div>
            {avg&&<DonutChart pct={avg} size={80} sw={9} color="rgba(255,255,255,0.9)"/>}
          </div>
          {graded.length>0&&<div style={{display:'flex',gap:16,marginTop:14,paddingTop:14,borderTop:'1px solid rgba(255,255,255,0.2)'}}>
            {best&&<div><div style={{fontSize:11,opacity:.7}}>הטוב ביותר</div><div style={{fontWeight:700,fontSize:13}}>🏆 {best.short} ({grades[best.id]})</div></div>}
            {worst&&best?.id!==worst?.id&&<div><div style={{fontSize:11,opacity:.7}}>לשיפור</div><div style={{fontWeight:700,fontSize:13}}>📈 {worst.short} ({grades[worst.id]})</div></div>}
          </div>}
        </div>

        {/* Grade bars chart */}
        {graded.length>0&&<div className="card" style={{padding:'16px',marginBottom:16}}>
          <div className="section-title" style={{marginBottom:12}}><div className="section-bar"/><span style={{fontWeight:700,fontSize:15,color:T.text}}>ציונים לפי קורס</span></div>
          {COURSES.map(c=>grades[c.id]?<GradeBar key={c.id} value={+grades[c.id]} label={c.short} color={c.color}/>:null)}
        </div>}

        {/* Per-course cards */}
        {COURSES.map(c=>{
          const ct=courseTasks(c.id);
          const done=ct.filter(t=>t.done).length;
          const pct=ct.length?Math.round(done/ct.length*100):0;
          const att=attendance[c.id]||{present:0,absent:0};
          const totalAtt=(att.present||0)+(att.absent||0);
          const attPct=totalAtt?Math.round((att.present||0)/totalAtt*100):null;
          return(
            <div key={c.id} className="card" style={{padding:'16px',marginBottom:12,borderRight:`4px solid ${c.color}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:T.text}}>{c.name}</div>
                  <div style={{fontSize:11,color:T.dim,marginTop:2}}>{c.code}</div>
                </div>
                <input type="number" className="grade-input" placeholder="ציון" value={grades[c.id]||''} min={0} max={100}
                  onChange={e=>setGrades(p=>({...p,[c.id]:e.target.value}))}/>
              </div>
              {ct.length>0&&<div style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:T.sub,marginBottom:4}}>
                  <span>משימות</span><span style={{fontWeight:700,color:pct===100?G:T.sub}}>{done}/{ct.length} ({pct}%)</span>
                </div>
                <div className="progress-bar" style={{height:5}}><div className="progress-fill" style={{width:`${pct}%`}}/></div>
              </div>}
              {c.format==='ZOOM'&&<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:8,borderTop:`1px solid ${T.sectionLine}`}}>
                <span style={{fontSize:12,color:T.sub}}>נוכחות {attPct!=null?`${attPct}%`:''} · ✅{att.present||0} ❌{att.absent||0}</span>
                <div style={{display:'flex',gap:6}}>
                  <button className="btn" onClick={()=>setAttendance(p=>({...p,[c.id]:{...att,present:(att.present||0)+1}}))}
                    style={{padding:'5px 10px',fontSize:12,background:'#e8f8e8',color:GD,borderRadius:8}}>+ הייתי</button>
                  <button className="btn" onClick={()=>setAttendance(p=>({...p,[c.id]:{...att,absent:(att.absent||0)+1}}))}
                    style={{padding:'5px 10px',fontSize:12,background:'#fee',color:'#e05050',borderRadius:8}}>+ חסרתי</button>
                </div>
              </div>}
            </div>
          );
        })}
      </div>
    );
  }

  // ── Settings Tab ──
  function SettingsTab(){
    const notifText=notifPerm==='granted'?'✅ התראות פעילות':notifPerm==='denied'?'❌ חסומות בדפדפן':'🔔 לא מופעלות';
    const notifColor=notifPerm==='granted'?G:notifPerm==='denied'?'#E24A4A':'#F39C12';
    return(
      <div className="slide-up">

        {/* Appearance */}
        <div className="section-title"><div className="section-bar"/><span style={{fontWeight:700,fontSize:16,color:T.text}}>מראה</span></div>
        <div className="card" style={{padding:'16px',marginBottom:20}}>
          <label style={{display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer'}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontSize:24}}>{dark?'🌙':'☀️'}</span>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:T.text}}>מצב כהה</div>
                <div style={{fontSize:12,color:T.sub}}>{dark?'Dark Mode פעיל':'Light Mode פעיל'}</div>
              </div>
            </div>
            <label className="toggle-switch">
              <input type="checkbox" checked={dark} onChange={e=>setDark(e.target.checked)}/>
              <span className="toggle-slider"/>
            </label>
          </label>
        </div>

        {/* Notifications */}
        <div className="section-title"><div className="section-bar"/><span style={{fontWeight:700,fontSize:16,color:T.text}}>התראות</span></div>
        <div className="card" style={{padding:'16px',marginBottom:20}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:notifPerm!=='granted'?14:0}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontSize:24}}>🔔</span>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:T.text}}>התראות משימות</div>
                <div style={{fontSize:12,color:notifColor}}>{notifText}</div>
              </div>
            </div>
            {notifPerm!=='denied'&&notifPerm!=='granted'&&(
              <button className="btn btn-green" onClick={requestNotifications} style={{padding:'8px 16px',fontSize:13}}>הפעל</button>
            )}
            {notifPerm==='granted'&&(
              <button className="btn" onClick={()=>{localStorage.removeItem('ono-last-notify');checkNotifications(tasks);alert('✅ בדיקת התראות הופעלה!')}}
                style={{padding:'8px 14px',fontSize:12,background:`${G}22`,color:GD,borderRadius:10}}>בדוק עכשיו</button>
            )}
          </div>
          {notifPerm!=='granted'&&<div style={{fontSize:12,color:T.sub,background:T.settingRow,padding:'10px 12px',borderRadius:10}}>
            📅 תקבל התראה יום לפני וביום ההגשה של כל משימה
          </div>}
          {notifPerm==='denied'&&<div style={{fontSize:12,color:'#E24A4A',background:'#fee',padding:'10px 12px',borderRadius:10,marginTop:8}}>
            כדי לאפשר: הגדרות דפדפן ← הרשאות אתר ← התראות
          </div>}
        </div>

        {/* Backup & Restore */}
        <div className="section-title"><div className="section-bar"/><span style={{fontWeight:700,fontSize:16,color:T.text}}>גיבוי ושחזור</span></div>
        <div className="card" style={{padding:'16px',marginBottom:20}}>
          <div style={{fontSize:13,color:T.sub,marginBottom:14}}>
            📦 {tasks.length} משימות · {Object.values(grades).filter(g=>g).length} ציונים · {Object.values(notes).filter(n=>n).length} הערות
          </div>
          <button className="btn btn-green" onClick={exportData} style={{width:'100%',padding:14,fontSize:15,marginBottom:10}}>
            ⬇️ ייצא גיבוי (JSON)
          </button>
          <label className="btn btn-ghost" style={{width:'100%',padding:14,fontSize:15,cursor:'pointer',borderRadius:12,textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
            ⬆️ ייבא גיבוי
            <input type="file" accept=".json" onChange={importData} style={{display:'none'}}/>
          </label>
        </div>

        {/* Print / PDF */}
        <div className="section-title"><div className="section-bar"/><span style={{fontWeight:700,fontSize:16,color:T.text}}>הדפסה / PDF</span></div>
        <div className="card" style={{padding:'16px',marginBottom:20}}>
          <div style={{fontSize:13,color:T.sub,marginBottom:14}}>
            מפיק דו"ח עם כל הציונים, המשימות והנוכחות שלך
          </div>
          <button className="btn btn-green" onClick={()=>window.print()} style={{width:'100%',padding:14,fontSize:15}}>
            🖨️ הדפס / שמור כ-PDF
          </button>
        </div>

        {/* Stats */}
        <div className="section-title"><div className="section-bar"/><span style={{fontWeight:700,fontSize:16,color:T.text}}>סטטיסטיקות</span></div>
        <div className="card" style={{padding:'16px',marginBottom:20}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {[
              {label:'סה"כ משימות',val:tasks.length,icon:'📋'},
              {label:'הושלמו',val:tasks.filter(t=>t.done).length,icon:'✅'},
              {label:'דחופות פתוחות',val:pending.filter(t=>t.priority).length,icon:'🔥'},
              {label:'חוזרות',val:tasks.filter(t=>t.recurring&&t.recurring!=='ללא חזרה').length,icon:'🔄'},
              {label:'עברו תאריך',val:overdue.length,icon:'⚠️'},
              {label:'ממוצע ציונים',val:avgGrade()||'—',icon:'🎓'},
            ].map(s=>(
              <div key={s.label} style={{background:T.settingRow,borderRadius:12,padding:'12px',textAlign:'center'}}>
                <div style={{fontSize:24,marginBottom:4}}>{s.icon}</div>
                <div style={{fontWeight:900,fontSize:22,color:T.text}}>{s.val}</div>
                <div style={{fontSize:11,color:T.sub}}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* App info */}
        <div style={{textAlign:'center',padding:'10px 0 4px',color:T.dim,fontSize:12}}>
          Ono מכינה v2.0 · נבנה עם ❤️
        </div>
      </div>
    );
  }

  // ── Course Sheet ──
  function CourseSheet(){
    const c=activeCourse;if(!c)return null;
    const ct=courseTasks(c.id);
    return(
      <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div className="sheet">
          <div className="sheet-handle"/>
          <div style={{borderRight:`4px solid ${c.color}`,paddingRight:12,marginBottom:20}}>
            <div style={{fontWeight:900,fontSize:20,color:T.text}}>{c.name}</div>
            <div style={{fontSize:13,color:T.sub,marginTop:4}}>{c.format==='E-Learning'?'🌐 E-Learning':`📅 יום ${c.day} | ${c.time}`}</div>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,color:T.sub,marginBottom:8,fontWeight:600}}>📓 הערות שלי</div>
            <textarea rows={3} placeholder="כתוב הערות, תמצות שיעור, דברים לזכור..." value={notes[c.id]||''}
              onChange={e=>setNotes(p=>({...p,[c.id]:e.target.value}))} style={{resize:'none',fontSize:14}}/>
          </div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,color:T.sub,marginBottom:8,fontWeight:600}}>ציון סופי</div>
            <input type="number" placeholder="הכנס ציון (0-100)" value={grades[c.id]||''}
              onChange={e=>setGrades(p=>({...p,[c.id]:e.target.value}))} style={{fontSize:18,fontWeight:700,textAlign:'center'}}/>
          </div>
          {ct.length>0&&<div style={{marginBottom:12}}>
            <div style={{fontSize:13,color:T.sub,marginBottom:8,fontWeight:600}}>משימות ({ct.length})</div>
            {[...ct].sort((a,b)=>a.done-b.done||new Date(a.dueDate||'9999')-new Date(b.dueDate||'9999'))
              .map(t=><TaskRow key={t.id} t={t} onEdit={()=>{setEditTask(t);setModal('edit')}}/>)}
          </div>}
          <button className="btn btn-green" onClick={()=>setModal('add')} style={{width:'100%',padding:14,fontSize:15}}>
            ＋ הוסף משימה לקורס זה
          </button>
        </div>
      </div>
    );
  }

  // ── Task Sheet ──
  function TaskSheet(){
    const isEdit=modal==='edit';
    const [form,setForm]=React.useState(isEdit?{...editTask}:{courseId:activeCourse?.id||'',type:'עבודה',title:'',dueDate:'',note:'',priority:false,recurring:'ללא חזרה'});
    const set=(k,v)=>setForm(p=>({...p,[k]:v}));
    const submit=()=>{
      if(!form.courseId||!form.title||!form.dueDate)return alert('מלא קורס, כותרת ותאריך');
      if(isEdit){updTask(form.id,form);setModal(null);}
      else addTask(form);
    };
    return(
      <div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
        <div className="sheet">
          <div className="sheet-handle"/>
          <div style={{fontWeight:900,fontSize:20,marginBottom:20,color:T.text}}>{isEdit?'✏️ עריכת משימה':'➕ משימה חדשה'}</div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div>
              <div style={{fontSize:13,color:T.sub,marginBottom:6,fontWeight:600}}>קורס *</div>
              <select value={form.courseId} onChange={e=>set('courseId',e.target.value)}>
                <option value="">בחר קורס...</option>
                {COURSES.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:13,color:T.sub,marginBottom:8,fontWeight:600}}>סוג</div>
              <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                {TYPES.map(tp=>(
                  <button key={tp} className={`chip${form.type===tp?' active':''}`} onClick={()=>set('type',tp)} style={{fontSize:13}}>
                    {TYPE_EMOJI[tp]} {tp}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:13,color:T.sub,marginBottom:6,fontWeight:600}}>כותרת *</div>
              <input placeholder="למשל: תרגיל 3, מבחן אמצע..." value={form.title} onChange={e=>set('title',e.target.value)}/>
            </div>
            <div>
              <div style={{fontSize:13,color:T.sub,marginBottom:6,fontWeight:600}}>תאריך הגשה / מועד *</div>
              <input type="date" value={form.dueDate} onChange={e=>set('dueDate',e.target.value)}/>
            </div>
            <div>
              <div style={{fontSize:13,color:T.sub,marginBottom:8,fontWeight:600}}>🔄 משימה חוזרת</div>
              <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                {RECURRING_OPTS.map(r=>(
                  <button key={r} className={`chip${(form.recurring||'ללא חזרה')===r?' active':''}`}
                    onClick={()=>set('recurring',r)} style={{fontSize:13}}>{r}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:13,color:T.sub,marginBottom:6,fontWeight:600}}>הערה (אופציונלי)</div>
              <textarea rows={2} placeholder="פרטים נוספים..." value={form.note} onChange={e=>set('note',e.target.value)} style={{resize:'none'}}/>
            </div>
            <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',padding:'13px 14px',background:form.priority?(dark?'#2a2000':'#FFFBF0'):T.settingRow,borderRadius:12,border:`1.5px solid ${form.priority?'#F39C12':T.inputBorder}`}}>
              <input type="checkbox" checked={!!form.priority} onChange={e=>set('priority',e.target.checked)} style={{width:18,height:18,accentColor:'#F39C12',flexShrink:0}}/>
              <span style={{fontWeight:600,fontSize:15,color:T.text}}>🔥 משימה דחופה / חשובה</span>
            </label>
            <div style={{display:'flex',gap:10,marginTop:4}}>
              <button className="btn btn-ghost" onClick={()=>setModal(null)} style={{flex:1,padding:14,fontSize:15}}>ביטול</button>
              <button className="btn btn-green" onClick={submit} style={{flex:2,padding:14,fontSize:16}}>{isEdit?'💾 שמור':'✓ הוסף'}</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Print Report (hidden, shown only when printing) ──
  function PrintReport(){
    const avg=avgGrade();
    return(
      <div className="print-report" style={{fontFamily:'Heebo,sans-serif',direction:'rtl',padding:24}}>
        <div style={{textAlign:'center',borderBottom:'3px solid #8DC63F',paddingBottom:16,marginBottom:20}}>
          <h1 style={{color:'#8DC63F',margin:0}}>Ono מכינה — דו"ח לימודים</h1>
          <p style={{color:'#666',margin:'4px 0 0'}}>{today.toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
        </div>
        <div style={{display:'flex',gap:20,marginBottom:20}}>
          <div style={{flex:1,background:'#f8f8f8',padding:14,borderRadius:12,textAlign:'center'}}>
            <div style={{fontWeight:900,fontSize:28,color:'#8DC63F'}}>{avg||'—'}</div>
            <div style={{fontSize:12,color:'#666'}}>ממוצע ציונים</div>
          </div>
          <div style={{flex:1,background:'#f8f8f8',padding:14,borderRadius:12,textAlign:'center'}}>
            <div style={{fontWeight:900,fontSize:28,color:'#4A90E2'}}>{tasks.filter(t=>t.done).length}/{tasks.length}</div>
            <div style={{fontSize:12,color:'#666'}}>משימות שהושלמו</div>
          </div>
          <div style={{flex:1,background:'#f8f8f8',padding:14,borderRadius:12,textAlign:'center'}}>
            <div style={{fontWeight:900,fontSize:28,color:'#F39C12'}}>{daysLeft}</div>
            <div style={{fontSize:12,color:'#666'}}>ימים לסיום</div>
          </div>
        </div>
        <h2 style={{color:'#333',marginBottom:12,fontSize:16}}>ציונים וקורסים</h2>
        <table style={{width:'100%',borderCollapse:'collapse',marginBottom:20,fontSize:13}}>
          <thead>
            <tr style={{background:'#8DC63F',color:'#fff'}}>
              <th style={{padding:'8px 12px',textAlign:'right'}}>קורס</th>
              <th style={{padding:'8px 12px',textAlign:'center'}}>קוד</th>
              <th style={{padding:'8px 12px',textAlign:'center'}}>ציון</th>
              <th style={{padding:'8px 12px',textAlign:'center'}}>משימות</th>
              <th style={{padding:'8px 12px',textAlign:'center'}}>נוכחות</th>
            </tr>
          </thead>
          <tbody>
            {COURSES.map((c,i)=>{
              const ct=courseTasks(c.id);
              const done=ct.filter(t=>t.done).length;
              const att=attendance[c.id]||{present:0,absent:0};
              const total=(att.present||0)+(att.absent||0);
              return(
                <tr key={c.id} style={{background:i%2===0?'#fff':'#f9f9f9',borderBottom:'1px solid #eee'}}>
                  <td style={{padding:'8px 12px',fontWeight:600}}>{c.name}</td>
                  <td style={{padding:'8px 12px',textAlign:'center',color:'#888'}}>{c.code}</td>
                  <td style={{padding:'8px 12px',textAlign:'center',fontWeight:900,color:grades[c.id]?'#8DC63F':'#ccc'}}>{grades[c.id]||'—'}</td>
                  <td style={{padding:'8px 12px',textAlign:'center'}}>{done}/{ct.length}</td>
                  <td style={{padding:'8px 12px',textAlign:'center'}}>{total?`${att.present}/${total}`:'—'}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        <h2 style={{color:'#333',marginBottom:12,fontSize:16}}>משימות פתוחות</h2>
        {pending.length===0?<p style={{color:'#888',fontSize:13}}>אין משימות פתוחות 🎉</p>:
          pending.sort((a,b)=>new Date(a.dueDate||'9999')-new Date(b.dueDate||'9999')).map(t=>{
            const course=COURSES.find(c=>c.id==t.courseId);
            const days=t.dueDate?getDL(t.dueDate):null;
            return(
              <div key={t.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 12px',background:'#f8f8f8',borderRadius:8,marginBottom:6,border:'1px solid #eee',fontSize:13}}>
                <span><strong>{t.title}</strong> · {course?.short} · {TYPE_EMOJI[t.type]} {t.type}</span>
                <span style={{color:days!==null&&days<0?'#E24A4A':days<=3?'#FF8C00':'#666',fontWeight:700}}>
                  {t.dueDate?new Date(t.dueDate).toLocaleDateString('he-IL',{day:'numeric',month:'numeric'}):''}
                </span>
              </div>
            );
          })
        }
      </div>
    );
  }

  const TABS=[
    {id:'home',label:'בית',icon:'🏠'},
    {id:'schedule',label:'לוח שעות',icon:'📅'},
    {id:'tasks',label:'משימות',icon:'✅'},
    {id:'grades',label:'ציונים',icon:'🎓'},
    {id:'settings',label:'הגדרות',icon:'⚙️'},
  ];

  const navH=68;
  return(
    <div dir="rtl" style={{fontFamily:"'Heebo',sans-serif",background:T.bg,minHeight:'100vh',color:T.text,paddingBottom:navH,transition:'background .3s,color .3s'}}>
      {/* Header */}
      <div className="sticky-header">
        <div style={{maxWidth:600,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',height:54}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:30,height:30,borderRadius:'50%',background:G,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span style={{fontSize:13,color:'#fff'}}>▶</span>
            </div>
            <span style={{fontWeight:900,fontSize:20,color:G,letterSpacing:-1}}>Ono</span>
            <span style={{fontWeight:300,fontSize:12,color:T.dim}}>מכינה {today.getFullYear()}</span>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {overdue.length>0&&<span className="badge pulse" style={{background:'#fee',color:'#E24A4A',fontSize:12}}>⚠️ {overdue.length} פגו</span>}
            <button onClick={()=>setDark(d=>!d)} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,padding:'4px 6px'}}>{dark?'☀️':'🌙'}</button>
          </div>
        </div>
      </div>

      {/* Print report */}
      <PrintReport/>

      {/* Content */}
      <div className="no-print" style={{maxWidth:600,margin:'0 auto',padding:'18px 14px 10px'}}>
        {tab==='home'&&<HomeTab/>}
        {tab==='schedule'&&<ScheduleTab/>}
        {tab==='tasks'&&<TasksTab/>}
        {tab==='grades'&&<GradesTab/>}
        {tab==='settings'&&<SettingsTab/>}
      </div>

      {/* Bottom Nav */}
      <div className="bottom-nav no-print">
        <div style={{maxWidth:600,margin:'0 auto',display:'flex',width:'100%'}}>
          {TABS.map(item=>(
            <div key={item.id} className="nav-item" onClick={()=>setTab(item.id)}>
              <div className="nav-icon" style={{filter:tab===item.id?'none':'grayscale(1) opacity(0.4)'}}>{item.icon}</div>
              <div className="nav-label" style={{color:tab===item.id?G:T.sub}}>{item.label}</div>
              {tab===item.id&&<div style={{width:16,height:2.5,background:G,borderRadius:2}}/>}
            </div>
          ))}
        </div>
      </div>

      {/* Modals */}
      {modal==='course'&&<CourseSheet/>}
      {(modal==='add'||modal==='edit')&&<TaskSheet/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
